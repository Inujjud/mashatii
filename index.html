<style>
  :root{
    --white:#ffffff;
    --red:#cc253a;
    --red-deep:#a81d2f;
    --ink:#1b1b19;
    --ink-soft:#6c6c68;
    --line:rgba(27,27,25,.08);
    --glass:rgba(255,255,255,.55);
    --glass-hover:rgba(255,255,255,.74);
    --maxw:460px;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{-webkit-text-size-adjust:100%}
  body{
    font-family:"IBM Plex Sans Arabic",system-ui,sans-serif;
    background:var(--white);
    color:var(--ink);
    min-height:100vh;
    min-height:100dvh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:48px 22px;
    position:relative;
    overflow-x:hidden;
    -webkit-font-smoothing:antialiased;
  }

  /* ambient brand backdrop — gives the glass real geometry to frost */
  .bg{position:fixed;inset:0;z-index:-1;overflow:hidden;pointer-events:none}
  .bg .orb{position:absolute;border-radius:50%;filter:blur(10px)}
  .bg .o1{width:60vw;height:60vw;max-width:520px;max-height:520px;top:-12%;inset-inline-end:-14%;
    background:radial-gradient(circle, rgba(204,37,58,.13), rgba(204,37,58,0) 68%)}
  .bg .o2{width:55vw;height:55vw;max-width:480px;max-height:480px;bottom:-16%;inset-inline-start:-16%;
    background:radial-gradient(circle, rgba(204,37,58,.10), rgba(204,37,58,0) 70%)}
  .bg .emblem{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
    width:128vw;max-width:760px;opacity:.05}

  .wrap{width:100%;max-width:var(--maxw);text-align:center;position:relative}

  .logo{width:148px;height:auto;margin:0 auto 22px;display:block;
    opacity:0;animation:rise .7s .05s cubic-bezier(.2,.7,.2,1) forwards}

  .tagline{font-size:1.02rem;font-weight:300;letter-spacing:.01em;color:var(--ink);
    opacity:0;animation:rise .7s .14s cubic-bezier(.2,.7,.2,1) forwards}
  .tagline .dot{color:var(--red);font-weight:600;margin:0 .35em;position:relative;top:-.04em}

  .divider{display:flex;align-items:center;justify-content:center;gap:0;margin:20px auto 26px;
    width:130px;opacity:0;animation:rise .7s .2s cubic-bezier(.2,.7,.2,1) forwards}
  .divider::before,.divider::after{content:"";height:1px;flex:1;background:var(--line)}
  .divider .node{width:9px;height:9px;border-radius:50%;border:2px solid var(--red);
    margin:0 9px;flex:none}

  .links{display:flex;flex-direction:column;gap:13px}

  .card{
    display:flex;align-items:center;gap:14px;
    text-decoration:none;color:var(--ink);
    padding:15px 17px;border-radius:17px;
    background:var(--glass);
    -webkit-backdrop-filter:blur(18px) saturate(150%);
    backdrop-filter:blur(18px) saturate(150%);
    border:1px solid rgba(204,37,58,.16);
    box-shadow:0 4px 22px rgba(27,27,25,.05), inset 0 1px 0 rgba(255,255,255,.6);
    transition:transform .28s cubic-bezier(.2,.7,.2,1), box-shadow .28s ease, border-color .28s ease, background .28s ease;
    opacity:0;animation:rise .6s cubic-bezier(.2,.7,.2,1) forwards;
  }
  .card:nth-child(1){animation-delay:.26s}
  .card:nth-child(2){animation-delay:.32s}
  .card:nth-child(3){animation-delay:.38s}
  .card:nth-child(4){animation-delay:.44s}
  .card:nth-child(5){animation-delay:.50s}

  .card:hover{transform:translateY(-2px);background:var(--glass-hover);
    border-color:rgba(204,37,58,.42);
    box-shadow:0 10px 30px rgba(204,37,58,.13), inset 0 1px 0 rgba(255,255,255,.7)}
  .card:active{transform:translateY(0)}
  .card:focus-visible{outline:2px solid var(--red);outline-offset:3px}

  /* icon framed in a ringed node — echoes the logo's nodes */
  .ico{width:42px;height:42px;flex:none;border-radius:50%;
    border:1.5px solid rgba(204,37,58,.28);
    display:flex;align-items:center;justify-content:center;
    color:var(--red);background:rgba(204,37,58,.05);
    transition:border-color .28s ease, background .28s ease}
  .ico svg{width:20px;height:20px;display:block}
  .card:hover .ico{border-color:var(--red);background:rgba(204,37,58,.1)}

  .txt{flex:1;text-align:start;line-height:1.25}
  .label{display:block;font-weight:600;font-size:1rem}
  .sub{display:block;font-size:.78rem;color:var(--ink-soft);margin-top:2px;font-weight:400;direction:ltr;text-align:start}
  .sub.ar{direction:rtl}

  .chev{flex:none;color:rgba(27,27,25,.3);display:flex;align-items:center;
    transition:transform .28s cubic-bezier(.2,.7,.2,1), color .28s ease}
  .chev svg{width:16px;height:16px}
  .card:hover .chev{transform:translateX(-4px);color:var(--red)}

  /* the single bold element: solid-red quote CTA */
  .cta{background:var(--red);border-color:var(--red);
    box-shadow:0 8px 24px rgba(204,37,58,.28), inset 0 1px 0 rgba(255,255,255,.18);
    -webkit-backdrop-filter:none;backdrop-filter:none}
  .cta .label,.cta .sub{color:#fff}
  .cta .sub{opacity:.86}
  .cta .ico{border-color:rgba(255,255,255,.55);background:rgba(255,255,255,.14);color:#fff}
  .cta .chev{color:rgba(255,255,255,.7)}
  .cta:hover{transform:translateY(-2px);background:var(--red-deep);border-color:var(--red-deep);
    box-shadow:0 12px 32px rgba(204,37,58,.36), inset 0 1px 0 rgba(255,255,255,.2)}
  .cta:hover .ico{border-color:#fff;background:rgba(255,255,255,.22)}
  .cta:hover .chev{color:#fff}

  .foot{margin-top:30px;opacity:0;animation:rise .6s .56s cubic-bezier(.2,.7,.2,1) forwards}
  .foot .role{font-size:.82rem;color:var(--ink-soft);font-weight:400}
  .foot .role b{color:var(--red);font-weight:600}
  .foot .cr{display:block;font-size:.72rem;color:rgba(27,27,25,.32);margin-top:8px;letter-spacing:.02em}

  @keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

  @media (prefers-reduced-motion: reduce){
    *{animation:none!important;transition:none!important}
    .logo,.tagline,.divider,.card,.foot{opacity:1!important;transform:none!important}
  }
  @media (max-width:380px){
    .logo{width:128px}
    .label{font-size:.95rem}
  }
</style>
